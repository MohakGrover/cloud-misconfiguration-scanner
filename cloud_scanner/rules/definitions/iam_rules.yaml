# IAM Security Rules

- rule_id: "aws-iam-001"
  name: "IAM User with Old Access Keys"
  severity: "MEDIUM"
  service: "iam"
  cis_mapping:
    framework: "CIS AWS Foundations Benchmark"
    version: "1.2.0"
    control: "1.4"
  description: |
    IAM user has access keys older than 90 days.
    Regular key rotation reduces the risk of compromised credentials.
  risk_factors:
    exploitability: 70
    blast_radius: 60
    business_impact: 50
  remediation:
    manual_steps: |
      1. Navigate to IAM Console -> Users
      2. Select user: {username}
      3. Go to Security credentials tab
      4. Create new access key
      5. Update applications to use new key
      6. Deactivate and delete old key
    cli_command: |
      aws iam create-access-key --user-name {username}
      aws iam update-access-key --access-key-id <old_key_id> --status Inactive --user-name {username}
      aws iam delete-access-key --access-key-id <old_key_id> --user-name {username}
  detection_logic:
    resource_type: "user"
    conditions:
      any:
        - field: "access_keys"
          operator: "contains" # Logic to check if ANY key in list has age_days > 90. 
          # Note: The simple evaluator might not support iterating lists of dicts with conditions.
          # For now, I'll rely on the Finding generation to perhaps handle complex logic or 
          # assume the evaluator 'contains' checks if the list contains a matching item (not currently implemented).
          # WORKAROUND: I will update the IAM Collector to surface 'has_old_keys: true' to simplify the rule.
          value: "OLD_KEY_MARKER" 

# Updating decision: I need to update IAM Collector to calculate 'has_old_keys' bool to make this rule simple.
