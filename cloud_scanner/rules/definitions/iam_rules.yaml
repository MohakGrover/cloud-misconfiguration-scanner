- rule_id: "aws-iam-002"
  name: "IAM Role with Overly Permissive Policies"
  severity: "CRITICAL"
  service: "iam"
  cis_mapping:
    framework: "CIS AWS Foundations Benchmark"
    version: "1.2.0"
    control: "1.16" # Approximate
  description: |
    IAM role has policies allowing full administrative access (*:*).
    This violates least privilege.
  remediation:
    manual_steps: |
      Review and scope down policies for role: {role_name}
  detection_logic:
    resource_type: "role"
    conditions:
      any:
        - field: "policies"
          # Complex check needed for *:*. 
          # Assuming collector surfaces "is_admin" boolean.
          operator: "equals" 
          value: true # Placeholder for has_admin_policy logic

- rule_id: "aws-iam-003"
  name: "Root Account Without MFA"
  severity: "CRITICAL"
  service: "iam"
  cis_mapping:
    framework: "CIS AWS Foundations Benchmark"
    version: "1.2.0"
    control: "1.1"
  description: |
    Root account does not have MFA enabled.
    Compromise of root account leads to full account takeover.
  remediation:
    manual_steps: |
      1. Sign in as root
      2. Go to IAM Dashboard
      3. Click "Activate MFA on your root account"
  detection_logic:
    resource_type: "account_summary"
    conditions:
      all:
        - field: "mfa_devices" # AccountMFAEnabled from account summary
          operator: "equals"
          value: 0
